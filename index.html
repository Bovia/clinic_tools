<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>齿科设计助手 · 一键出图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    textarea { resize: vertical; min-height: 2.5rem; }
    .tab-active { background: #0d9488; color: #fff; box-shadow: 0 2px 8px rgba(13,148,136,.35); }
    .tpl-pill { transition: all .2s; }
    .tpl-pill.active { box-shadow: 0 0 0 2px #0d9488; }
    .cal-day { cursor: pointer; }
    .cal-day-cell { position: relative; }
    .cal-day-tip-global {
      position: fixed;
      transform: translate(-50%, calc(-100% - 6px));
      padding: 6px 10px;
      background: #ffffff;
      color: #475569;
      font-size: 10px;
      line-height: 1.5;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.18s ease 0s, visibility 0.18s ease 0s;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.1);
    }
    .cal-day-tip-global::before {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #e2e8f0;
    }
    .cal-day-tip-global::after {
      content: '';
      position: absolute;
      top: calc(100% - 1px);
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: #ffffff;
    }
    .cal-day-tip-global.visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 0.2s ease 0.45s, visibility 0.2s ease 0.45s;
    }
    .sch-form-title {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      letter-spacing: 0.02em;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e2e8f0;
    }
    .sch-month-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .sch-month-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .sch-month-btn:hover {
      background: #f1f5f9;
      border-color: #94a3b8;
    }
    .sch-month-label {
      min-width: 128px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      letter-spacing: 0.02em;
    }
    .sch-settings-block {
      padding: 10px 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .sch-settings-title {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .sch-settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 12px;
    }
    .sch-check-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: #334155;
      user-select: none;
    }
    .sch-check-item input[type="checkbox"] {
      width: 15px;
      height: 15px;
      margin: 0;
      flex-shrink: 0;
      accent-color: #0d9488;
      cursor: pointer;
    }
    .sch-field-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 6px;
    }
    .sch-field-input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .sch-field-input:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
    }
    .preview-card {
      width: 360px;
      flex-shrink: 0;
    }
    .preview-card > .export-root { width: 360px; }
    .preview-frame {
      width: 100%;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      padding: 16px;
      box-sizing: border-box;
    }
    .preview-scale-host {
      position: relative;
      flex-shrink: 0;
    }
    .preview-scale-host .preview-card {
      transform-origin: top left;
    }
    .preview-with-export {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }
    .preview-export-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 8px;
      flex-shrink: 0;
    }
    @media (max-width: 640px) {
      .preview-with-export {
        flex-direction: column;
        align-items: stretch;
      }
      .preview-export-actions {
        padding-top: 0;
        align-items: center;
      }
    }

    .export-loading { pointer-events: none; opacity: .6; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <!-- 顶栏 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center text-white font-bold text-lg shadow-md">齿</div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">齿科设计助手</h1>
          <p class="text-xs text-slate-500">排期表 · 术后须知 · 其他图文 · 一键出图</p>
        </div>
      </div>
      <nav class="flex gap-2 bg-slate-100 p-1 rounded-full">
        <button id="tab-schedule" onclick="switchTab('schedule')" class="tab-btn tab-active px-4 py-2 rounded-full text-sm font-medium transition">节假日排期</button>
        <button id="tab-care" onclick="switchTab('care')" class="tab-btn px-4 py-2 rounded-full text-sm font-medium text-slate-600 transition">术后护理</button>
        <button id="tab-other" onclick="switchTab('other')" class="tab-btn px-4 py-2 rounded-full text-sm font-medium text-slate-600 transition">其他</button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- ========== 节假日排期 ========== -->
    <section id="panel-schedule">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <h2 class="text-xl font-bold text-slate-900">节假日排期表</h2>
            <p class="text-sm text-slate-500 mt-1">自动获取节假日数据，左键点击切换诊↔休，右键切换高亮（出诊显示「上班」、休息显示「休息」），一键导出通知图</p>
          </div>
          <button onclick="refreshHolidays()" class="px-4 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            刷新节假日
          </button>
        </div>
        <div class="mt-3">
          <label class="text-sm text-slate-600 mb-1.5 block">选择风格</label>
          <div id="style-pills" class="flex flex-wrap gap-1.5"></div>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-6 pb-8">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
          <h3 class="sch-form-title">排期信息</h3>
          <div class="space-y-4">
            <div class="sch-month-bar">
              <button type="button" onclick="changeMonth(-1)" class="sch-month-btn" aria-label="上一月">&lt;</button>
              <span id="month-label" class="sch-month-label"></span>
              <button type="button" onclick="changeMonth(1)" class="sch-month-btn" aria-label="下一月">&gt;</button>
            </div>
            <div class="sch-settings-block">
              <div class="sch-settings-title">显示设置</div>
              <div class="sch-settings-grid">
                <label class="sch-check-item">
                  <input id="sch-show-lunar" type="checkbox" checked onchange="renderSchedulePreview()" />
                  <span>展示农历</span>
                </label>
                <label class="sch-check-item">
                  <input id="sch-show-full-month" type="checkbox" checked onchange="renderSchedulePreview()" />
                  <span>展示整月</span>
                </label>
              </div>
            </div>
            <div>
              <label class="sch-field-label" for="sch-clinic">诊所名称</label>
              <input id="sch-clinic" type="text" placeholder="如：阳光口腔诊所" oninput="renderSchedulePreview()" class="sch-field-input" />
            </div>
            <div>
              <label class="sch-field-label" for="sch-phone">联系电话</label>
              <input id="sch-phone" type="text" placeholder="如：010-12345678" oninput="renderSchedulePreview()" class="sch-field-input" />
            </div>
            <div>
              <label class="sch-field-label" for="sch-greeting">祝贺文案（选填）</label>
              <textarea id="sch-greeting" rows="4" placeholder="如：祝您端午安康，阖家幸福！" oninput="renderSchedulePreview()" class="sch-field-input"></textarea>
            </div>
          </div>
        </div>

        <div class="preview-with-export lg:justify-start w-full">
          <div id="schedule-preview-frame" class="preview-frame flex-1 min-w-0 w-full">
            <div id="schedule-preview-host" class="preview-scale-host">
              <div id="schedule-preview" class="preview-card bg-white rounded-2xl shadow-xl overflow-hidden"></div>
            </div>
          </div>
          <div class="preview-export-actions">
            <button onclick="exportImage('schedule')" class="px-4 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-sm whitespace-nowrap">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              导出图片
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 术后护理 ========== -->
    <section id="panel-care" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <h2 class="text-xl font-bold text-slate-900">术后护理须知</h2>
        <p class="text-sm text-slate-500 mt-1">选择模板，填写个性化信息，一键生成患者须知图</p>
        <div class="mt-3">
          <label class="text-sm text-slate-600 mb-1.5 block">选择模板</label>
          <div id="tpl-grid" class="flex flex-wrap gap-1.5"></div>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-6 pb-8">
        <!-- 左侧控制 -->
        <div class="space-y-6">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">个性化信息</h3>
            <div class="space-y-3">
              <div>
                <label class="text-xs text-slate-500 mb-1 block">诊所名称</label>
                <input id="care-clinic" type="text" placeholder="如：阳光口腔诊所" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">联系电话</label>
                <input id="care-phone" type="text" placeholder="如：010-12345678" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">复诊时间</label>
                <input id="care-followup" type="text" placeholder="如：术后7天上午10:00" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">医生建议（选填）</label>
                <textarea id="care-advice" rows="4" placeholder="可补充个性化医嘱..." oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30"></textarea>
              </div>
            </div>
          </div>
        </div>

        <!-- 右侧预览 -->
        <div class="preview-with-export lg:justify-start w-full">
          <div id="care-preview-frame" class="preview-frame flex-1 min-w-0 w-full">
            <div id="care-preview-host" class="preview-scale-host">
              <div id="care-preview" class="preview-card bg-white rounded-2xl shadow-xl overflow-hidden"></div>
            </div>
          </div>
          <div class="preview-export-actions">
            <button onclick="exportImage('care')" class="px-4 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-sm whitespace-nowrap">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              导出图片
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== 其他图文 ========== -->
    <section id="panel-other" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <h2 class="text-xl font-bold text-slate-900">其他图文</h2>
        <p class="text-sm text-slate-500 mt-1">选择模板，填写文案信息，一键生成宣传图</p>
        <div class="mt-3">
          <label class="text-sm text-slate-600 mb-1.5 block">选择模板</label>
          <div id="other-tpl-grid" class="flex flex-wrap gap-1.5"></div>
        </div>
      </div>

      <div class="grid lg:grid-cols-5 gap-6 pb-8">
        <div class="space-y-6 lg:col-span-2">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">图文信息</h3>
            <div class="space-y-3">
              <div>
                <label id="other-clinic-label" class="text-xs text-slate-500 mb-1 block">诊所名称</label>
                <textarea id="other-clinic" rows="1" placeholder="如：阳光口腔诊所" oninput="renderOtherPreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30"></textarea>
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">联系电话</label>
                <input id="other-phone" type="text" placeholder="如：010-12345678" oninput="renderOtherPreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div id="other-address-wrap">
                <label class="text-xs text-slate-500 mb-1 block">诊所地址（选填）</label>
                <input id="other-address" type="text" placeholder="如：阳光大街001号" oninput="renderOtherPreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">副标题（选填）</label>
                <input id="other-subtitle" type="text" placeholder="如：一袭白衣 心怀暖阳" oninput="renderOtherPreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">正文文案（选填）</label>
                <textarea id="other-message" rows="8" placeholder="如：你们用温柔双手 呵护生命希望" oninput="onOtherMessageInput(this)"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30"></textarea>
              </div>
            </div>
          </div>
        </div>
        <div class="lg:col-span-3 w-full preview-with-export lg:justify-start">
          <div id="other-preview-frame" class="preview-frame flex-1 min-w-0">
            <div id="other-preview-host" class="preview-scale-host">
              <div id="other-preview" class="preview-card poster bg-white rounded-2xl shadow-xl overflow-hidden"></div>
            </div>
          </div>
          <div class="preview-export-actions">
            <button onclick="exportImage('other')" class="px-4 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-sm whitespace-nowrap">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              导出图片
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6 border-t border-slate-100">
  齿科设计助手 · 门诊图文工具
  </footer>

<script>
// ==================== 全局状态 ====================
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

let currentMonth = new Date().getMonth(); // 0-indexed
let holidayData = {};       // 'MM-DD' -> { holiday, name, date }
let dayOverrides = {};      // 'YYYY-MM-DD' -> true(出诊) / false(休息)

let selectedStyle = 'auto';
let selectedTemplate = 'extraction';
let selectedOtherTemplate = 'dental_day';

// ==================== 主题配置 ====================

  midautumn: {

function switchTab(tab) {
  ['schedule', 'care', 'other'].forEach(name => {
    document.getElementById(`panel-${name}`).classList.toggle('hidden', tab !== name);
    const btn = document.getElementById(`tab-${name}`);
    btn.classList.toggle('tab-active', tab === name);
    btn.classList.toggle('text-slate-600', tab !== name);
  });
  requestAnimationFrame(updateAllPreviewScales);
}

// ==================== 节假日 API ====================
async function fetchFromTimor(year) {
  const res = await fetch(`https://timor.tech/api/holiday/year/${year}/?type=Y&week=Y`);
  const json = await res.json();
  if (json.code === 0 && json.holiday) {
    holidayData = json.holiday;
    return true;
  }
  return false;
}

async function fetchFromHolidayCn(year) {
  const urls = [
    `https://cdn.jsdelivr.net/gh/NateScarlet/holiday-cn@master/${year}.json`,
    `https://raw.githubusercontent.com/NateScarlet/holiday-cn/master/${year}.json`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      const json = await res.json();
      if (json.days) {
        const map = {};
        json.days.forEach(day => {
          const [, mm, dd] = day.date.split('-');
          const key = `${mm}-${dd}`;
          map[key] = {
            holiday: day.isOffDay,
            name: day.isOffDay ? day.name : (day.name || '补班'),
            date: day.date,
          };
        });
        holidayData = map;
        return true;
      }
    } catch (_) { /* try next */ }
  }
  return false;
}

async function fetchHolidays(year) {
  try {
    if (await fetchFromTimor(year)) return true;
  } catch (e) {
    console.warn('timor.tech 获取失败，尝试备用源', e);
  }
  try {
    if (await fetchFromHolidayCn(year)) return true;
  } catch (e) {
    console.warn('备用节假日源也失败，使用周末默认规则', e);
  }
  holidayData = {};
  return false;
}

async function refreshHolidays() {
  const btn = event?.target?.closest('button');
  if (btn) btn.classList.add('export-loading');
  await fetchHolidays(currentYear);
  initDayStates();
  renderSchedulePreview();
  renderStylePills();
  if (btn) btn.classList.remove('export-loading');
}

function lunarYearDays(y) {
  let sum = 348;
  const info = LUNAR_INFO[y - 1900];
  for (let i = 0x8000; i > 0x8; i >>= 1) sum += (info & i) ? 1 : 0;
  return sum + lunarLeapDays(y);
}

function lunarLeapMonth(y) {
  return LUNAR_INFO[y - 1900] & 0xf;
}

function lunarLeapDays(y) {
  if (lunarLeapMonth(y)) return (LUNAR_INFO[y - 1900] & 0x10000) ? 30 : 29;
  return 0;
}

function lunarMonthDays(y, m) {
  return (LUNAR_INFO[y - 1900] & (0x10000 >> m)) ? 30 : 29;
}

function solarToLunar(y, m, d) {
  if (y < 1900 || y > 2099 || !LUNAR_INFO[y - 1900]) return null;
  const cur = new Date(y, m - 1, d, 12, 0, 0);
  const base = new Date(1900, 0, 31, 12, 0, 0);
  let offset = Math.floor((cur - base) / 86400000);
  let i = 1900;
  let temp = 0;
  for (; i < 2100 && offset > 0; i++) {
    temp = lunarYearDays(i);
    offset -= temp;
  }
  if (offset < 0) {
    offset += temp;
    i--;
  }
  const year = i;
  const leap = lunarLeapMonth(year);
  let isLeap = false;
  i = 1;
  for (; i < 13 && offset > 0; i++) {
    if (leap > 0 && i === leap + 1 && !isLeap) {
      i--;
      isLeap = true;
      temp = lunarLeapDays(year);
    } else {
      temp = lunarMonthDays(year, i);
    }
    if (isLeap && i === leap + 1) isLeap = false;
    offset -= temp;
  }
  if (offset === 0 && leap > 0 && i === leap + 1) {
    if (isLeap) isLeap = false;
    else { isLeap = true; i--; }
  }
  if (offset < 0) {
    offset += temp;
    i--;
  }
  return { month: i, day: offset + 1, isLeap };
}

function isShowLunarCalendar() {
  const el = document.getElementById('sch-show-lunar');
  return el ? el.checked : true;
}

function isShowFullMonthCalendar() {

  return el ? el.checked : true;
}

function weekHasRestOnPage(y, m, week) {
  return week.some(day => day > 0 && !isWorkDay(y, m, day));
}

function buildMonthCalendarWeeks(y, m) {
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const firstDay = new Date(y, m, 1).getDay();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;
  const slots = [];
  for (let i = 0; i < startOffset; i++) slots.push(0);
  for (let d = 1; d <= daysInMonth; d++) slots.push(d);
  while (slots.length % 7 !== 0) slots.push(0);
  const weeks = [];
  for (let i = 0; i < slots.length; i += 7) {
    weeks.push(slots.slice(i, i + 7));
  }
  if (!isShowFullMonthCalendar()) {
    return weeks.filter(week => weekHasRestOnPage(y, m, week));
  }
  return weeks;
}

function getLunarDayLabel(y, m, d) {
  if (typeof Solar !== 'undefined') {
    try {
      const lunar = Solar.fromYmd(y, m + 1, d).getLunar();
      const day = lunar.getDayInChinese();
      if (day === '初一') return lunar.getMonthInChinese() + '月';
      return day;
    } catch (_) { /* 离线时走本地换算 */ }
  }
  const lunar = solarToLunar(y, m + 1, d);
  if (!lunar) return '';
  if (lunar.day === 1) {
    const prefix = lunar.isLeap ? '闰' : '';
    return prefix + LUNAR_MONTH_CHARS[lunar.month - 1] + '月';
  }
  return LUNAR_DAY_CHARS[lunar.day - 1] || '';
}

function calendarLunarLine(d, size, color) {
  if (!isShowLunarCalendar()) return '';
  const text = getLunarDayLabel(currentYear, currentMonth, d);
  if (!text) return '';
  return `<div style="font-size:${size}px;line-height:10px;color:${color};margin-top:1px;">${esc(text)}</div>`;
}

function isDayEmphasized(y, m, d) {
  return !!dayEmphasis[dateKey(y, m, d)];
}

let calTipShowTimer = null;
let calTipVisible = false;
let calTipMouseX = 0;
let calTipMouseY = 0;

function ensureCalDayTooltipEl() {
  let tip = document.getElementById('cal-day-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'cal-day-tooltip';
    tip.className = 'cal-day-tip-global';
    tip.setAttribute('aria-hidden', 'true');
    tip.innerHTML = '左键：切换休假<br>右键：切换高亮';
    document.body.appendChild(tip);
  }
  return tip;
}

function positionCalDayTip(cell) {
  const tip = ensureCalDayTooltipEl();
  const rect = cell.getBoundingClientRect();
  tip.style.left = `${rect.left + rect.width / 2}px`;
  tip.style.top = `${rect.top}px`;
}

function showCalDayTip(cell) {
  positionCalDayTip(cell);
  const tip = ensureCalDayTooltipEl();
  tip.classList.add('visible');
  tip.setAttribute('aria-hidden', 'false');
  calTipVisible = true;
}

function hideCalDayTip() {
  clearTimeout(calTipShowTimer);
  calTipShowTimer = null;
  const tip = document.getElementById('cal-day-tooltip');
  if (tip) {
    tip.classList.remove('visible');
    tip.setAttribute('aria-hidden', 'true');
  }
  calTipVisible = false;
}

function scheduleCalDayTipShow(cell) {
  clearTimeout(calTipShowTimer);
  calTipShowTimer = setTimeout(() => showCalDayTip(cell), 450);
}

function getCalDayCellFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  return el?.closest?.('.cal-day-cell.cal-day') || null;
}

function refreshCalDayTipAfterRender() {
  const host = document.getElementById('schedule-preview');
  const cell = getCalDayCellFromPoint(calTipMouseX, calTipMouseY);
  if (cell && host?.contains(cell)) {
    if (calTipVisible) positionCalDayTip(cell);
    else if (calTipShowTimer) scheduleCalDayTipShow(cell);
    return;
  }
  if (calTipVisible || calTipShowTimer) hideCalDayTip();
}

function setupCalDayTooltip() {
  const host = document.getElementById('schedule-preview');
  const frame = document.getElementById('schedule-preview-frame');
  if (!host || host.dataset.tipBound) return;
  host.dataset.tipBound = '1';
  ensureCalDayTooltipEl();

  host.addEventListener('mousemove', e => {
    calTipMouseX = e.clientX;
    calTipMouseY = e.clientY;
    if (!calTipVisible) return;
    const cell = e.target.closest('.cal-day-cell.cal-day');
    if (cell) positionCalDayTip(cell);
  });

  host.addEventListener('mouseover', e => {
    const cell = e.target.closest('.cal-day-cell.cal-day');
    if (!cell || !host.contains(cell)) return;
    if (calTipVisible) {
      positionCalDayTip(cell);
      return;
    }
    scheduleCalDayTipShow(cell);
  });

  host.addEventListener('mouseout', e => {
    const fromCell = e.target.closest('.cal-day-cell.cal-day');
    if (!fromCell) return;
    const related = e.relatedTarget;
    if (related && fromCell.contains(related)) return;
    const toCell = related?.closest?.('.cal-day-cell.cal-day');
    if (toCell && host.contains(toCell)) {
      clearTimeout(calTipShowTimer);
      if (calTipVisible) showCalDayTip(toCell);
      else scheduleCalDayTipShow(toCell);
      return;
    }
    if (!related || !document.body.contains(related)) {
      requestAnimationFrame(() => {
        const cell = getCalDayCellFromPoint(calTipMouseX, calTipMouseY);
        if (cell && host.contains(cell)) {
          if (calTipVisible) positionCalDayTip(cell);
          else scheduleCalDayTipShow(cell);
          return;
        }
        hideCalDayTip();
      });
      return;
    }
    hideCalDayTip();
  });

  frame?.addEventListener('mouseleave', hideCalDayTip);
}

function buildScheduleDayCell(d, opts) {
  const {
    interactive, cellW, cellH, holidayMaxLen, radius = 7, numSize = 13, numLh = 15,
    workBg = 'rgba(240,253,244,0.95)', restBg = 'rgba(254,242,242,0.95)',
    workBorder = '#86efac', restBorder = '#fca5a5',
    workNumColor = '#15803d', restNumColor = '#dc2626',
  } = opts;
  if (!d) return `<td style="width:${cellW}px;height:${cellH}px;padding:0;border:0;box-sizing:border-box;"></td>`;
  const work = isWorkDay(currentYear, currentMonth, d);
  const info = getHolidayInfo(currentYear, currentMonth, d);
  const emphasized = isDayEmphasized(currentYear, currentMonth, d);
  const holidayLabel = getDayHolidayLabel(info, holidayMaxLen);
  const numColor = work ? workNumColor : restNumColor;
  const bg = work ? workBg : restBg;
  const border = work ? workBorder : restBorder;
  const lunarLine = calendarLunarLine(d, 8, '#94a3b8');
  const handlers = interactive
    ? ` onclick="toggleDay(${currentYear},${currentMonth},${d})" oncontextmenu="toggleDayEmphasis(${currentYear},${currentMonth},${d},event)" class="cal-day-cell cal-day"`
    : ' class="cal-day-cell"';
  return `<td style="width:${cellW}px;height:${cellH}px;padding:3px 2px 0;border:0;vertical-align:top;overflow:visible;box-sizing:border-box;">
    <div${handlers} style="position:relative;overflow:visible;width:100%;height:100%;background:${bg};border:1px solid ${border};border-radius:${radius}px;text-align:center;box-sizing:border-box;padding:3px 2px;">
      ${calendarStatusBadge(currentYear, currentMonth, d, work, emphasized)}
      <div style="font-size:${numSize}px;font-weight:700;line-height:${numLh}px;color:${numColor};">${d}</div>
      ${lunarLine}
      ${holidayLabel
        ? `<div style="font-size:9px;line-height:12px;color:#dc2626;margin-top:1px;font-weight:500;">${esc(holidayLabel)}</div>`
        : ''}
    </div>
  </td>`;
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function isWeekend(y, m, d) {
  const day = new Date(y, m, d).getDay();
  return day === 0 || day === 6;
}

function getHolidayInfo(y, m, d) {
  const key = `${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return holidayData[key] || null;
}

function defaultIsWork(y, m, d) {
  const info = getHolidayInfo(y, m, d);
  if (info) {
    if (info.holiday === true) return false;
    if (info.holiday === false) return true; // 调休上班
  }
  return !isWeekend(y, m, d);
}

function isWorkDay(y, m, d) {
  const k = dateKey(y, m, d);
  if (k in dayOverrides) return dayOverrides[k];
  return defaultIsWork(y, m, d);
}

function initDayStates() {
  // 切换月份时保留已有 override，不重置
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  fetchHolidays(currentYear).then(() => {
    renderSchedulePreview();
    renderStylePills();
  });
}

function detectAutoTheme() {
  for (let d = 1; d <= 31; d++) {
    const info = getHolidayInfo(currentYear, currentMonth, d);
    if (info && info.holiday && isRealHolidayName(info.name)) {
      for (const [kw, theme] of Object.entries(HOLIDAY_THEME_MAP)) {
        if (info.name.includes(kw)) return theme;
      }
    }
  }
  return 'ocean';
}

function getActiveTheme() {
  const key = selectedStyle === 'auto' ? detectAutoTheme() : selectedStyle;
  return THEMES[key] || THEMES.ocean;
}

function isRealHolidayName(name) {
  if (!name) return false;
  if (/^周[一二三四五六日]$/.test(name)) return false;
  if (name === '补班' || name.includes('补班')) return false;
  return true;
}

function isOffDay(info) {
  return info && (info.holiday === true || info.holiday === 1);
}

function toggleDay(y, m, d) {
  const k = dateKey(y, m, d);
  const current = isWorkDay(y, m, d);
  const next = !current;
  const defaultWork = defaultIsWork(y, m, d);
  if (next === defaultWork) {
    delete dayOverrides[k];
    delete dayEmphasis[k];
  } else {
    dayOverrides[k] = next;
  }
  renderSchedulePreview();
}

function toggleDayEmphasis(y, m, d, event) {
  if (event) event.preventDefault();
  const k = dateKey(y, m, d);
  if (dayEmphasis[k]) delete dayEmphasis[k];
  else dayEmphasis[k] = true;
  renderSchedulePreview();
}

function getDayHolidayLabel(info, maxLen = 3) {
  if (!info || !isOffDay(info)) return '';
  const name = String(info.name || '').trim();
  if (!isRealHolidayName(name)) return '';
  return name.replace(/节$/, '').slice(0, maxLen);
}

function getMonthFestivalName() {
  for (let d = 1; d <= 31; d++) {
    const info = getHolidayInfo(currentYear, currentMonth, d);
    if (info && info.holiday && isRealHolidayName(info.name)) return info.name;
  }
  return '';
}

function getMonthGreeting() {
  const theme = getActiveTheme();
  if (theme.greeting) return theme.greeting;
  const fest = getMonthFestivalName();
  if (fest) return `祝您${fest}快乐`;
  return '';
}

function getMonthTag() {
  const theme = getActiveTheme();
  if (theme.tag) return theme.tag;
  return getMonthFestivalName();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}

function shadeHex(hex, amount) {
  const [r, g, b] = hexToRgb(hex);
  const clamp = v => Math.max(0, Math.min(255, Math.round(v)));
  return `#${[clamp(r + amount), clamp(g + amount), clamp(b + amount)].map(v => v.toString(16).padStart(2, '0')).join('')}`;
}

function rgbaHex(hex, alpha) {
  const [r, g, b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

function careThemeGradient(color) {
  return `linear-gradient(135deg, ${shadeHex(color, -35)} 0%, ${color} 52%, ${shadeHex(color, 28)} 100%)`;
}

function getSchCustomGreeting() {
  return (document.getElementById('sch-greeting')?.value || '').trim();
}

function updateGreetingPlaceholder() {
  const el = document.getElementById('sch-greeting');
  if (!el) return;
  const theme = getActiveTheme();
  el.placeholder = theme.greeting
    ? `如：${theme.greeting}！`
    : '如：愿您齿健人康，笑口常开！';
}

function getThemeGradient(themeKey) {

}

function tplPillButton(label, color, active, onclick, themeActive = false) {
  const base = 'tpl-pill px-3 py-1.5 rounded-full text-xs border';
  let cls = `${base} border-slate-200 text-slate-600 hover:bg-slate-50`;
  let extraStyle = '';
  if (active) {
    if (themeActive) {
      cls = `${base} active font-medium`;
      extraStyle = `border-color:${color};background-color:${rgbaHex(color, 0.12)};color:${color};box-shadow:0 0 0 2px ${rgbaHex(color, 0.35)}`;
    } else {
      cls = `${base} active border-teal-500 bg-teal-50 text-teal-700 font-medium`;
    }
  }
  const styleAttr = extraStyle ? ` style="${extraStyle}"` : '';
  return `<button type="button" onclick="${onclick}" class="${cls}"${styleAttr}>
    <span class="inline-block w-2 h-2 rounded-full mr-1.5 align-middle" style="background:${color}"></span><span class="align-middle">${esc(label)}</span>
  </button>`;
}

function renderStylePills() {
  const autoTheme = detectAutoTheme();
  const autoLabel = THEMES[autoTheme]?.tag || '自动';
  const container = document.getElementById('style-pills');
  container.innerHTML = Object.entries(THEMES).map(([key, t]) => {
    const label = key === 'auto' ? `节日自动 · ${autoLabel}` : t.label;
    return tplPillButton(label, t.color, selectedStyle === key, `selectStyle('${key}')`);
  }).join('');
}

function selectStyle(key) {
  selectedStyle = key;
  renderStylePills();
  renderSchedulePreview();
}

function isPosterTheme(themeKey) {
  return Boolean(THEMES[themeKey]?.backgroundImage);
}

function isFileProtocol() {
  return window.location.protocol === 'file:';
}

function resolveAssetPath(path) {
  try {
    return new URL(path, window.location.href).href;
  } catch (_) {
    return path;
  }
}

function isSameOriginUrl(url) {
  try {
    return new URL(url, window.location.href).origin === window.location.origin;
  } catch (_) {
    return false;
  }
}

function getEmbeddedAsset(imagePath) {
  const entry = window.EMBEDDED_ASSETS?.[imagePath];
  if (!entry) return null;
  return typeof entry === 'string' ? { dataUrl: entry } : entry;
}

function loadEmbeddedAssets() {
  if (window.EMBEDDED_ASSETS || !isFileProtocol()) return Promise.resolve();
  return new Promise(resolve => {
    const s = document.createElement('script');
    s.src = resolveAssetPath('assets-embed.js');
    s.onload = resolve;
    s.onerror = resolve;
    document.head.appendChild(s);
  });
}

function parseClinicInfoText(text) {
  const map = { '诊所名称': 'name', '联系电话': 'phone', '诊所地址': 'address' };
  const info = {};
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;
    const sep = trimmed.indexOf('=');
    if (sep < 0) continue;
    const key = map[trimmed.slice(0, sep).trim()];
    if (key) info[key] = trimmed.slice(sep + 1).trim();
  }
  return info;
}

async function loadClinicInfo() {
  if (window.CLINIC_INFO) return;
  if (!isFileProtocol()) {
    try {
      const res = await fetch(resolveAssetPath('clinic-info.txt'));
      if (res.ok) {
        window.CLINIC_INFO = parseClinicInfoText(await res.text());
        return;
      }
    } catch (_) { /* fallback */ }
  }
  await new Promise(resolve => {

function imageSizeCacheKey(imagePath) {
  return `${imagePath}@${POSTER_ASSET_VERSION}`;
}

function posterHeightFor(imagePath, fallback = DEFAULT_POSTER_H) {
  const size = imagePath && imageSizeCache[imageSizeCacheKey(imagePath)];
  if (!size || !size.w) return fallback;
  return Math.round(EXPORT_W * size.h / size.w);
}

function assetPathFromSrc(src) {
  if (!src) return null;
  const m = String(src).match(/assets\/[^?&#]+/);
  return m ? m[0] : null;
}

function canvasFromImage(img) {
  const c = document.createElement('canvas');
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  c.getContext('2d').drawImage(img, 0, 0);
  return c.toDataURL('image/png');
}

function findLoadedImage(src) {
  const base = src.split('?')[0];
  const path = assetPathFromSrc(src);
  return [...document.querySelectorAll('img')]
    .find(img => img.complete && img.naturalWidth > 0 && (
      img.src === src || img.src.startsWith(base) || (path && img.src.includes(path))
    ));
}

async function ensureImageSize(imagePath) {
  if (!imagePath) return null;
  const key = imageSizeCacheKey(imagePath);
  if (imageSizeCache[key]?.w) return imageSizeCache[key];

  const embedded = getEmbeddedAsset(imagePath);
  if (embedded?.dataUrl) {
    const entry = { w: embedded.w, h: embedded.h, dataUrl: embedded.dataUrl };
    if (!entry.w || !entry.h) {
      try {
        const img = await preloadImage(embedded.dataUrl);
        entry.w = img.naturalWidth;
        entry.h = img.naturalHeight;
      } catch (_) { /* keep partial */ }
    }
    imageSizeCache[key] = entry;
    return entry;
  }

  try {
    const img = await preloadImage(posterImageSrc(imagePath));
    const entry = { w: img.naturalWidth, h: img.naturalHeight };
    try { entry.dataUrl = canvasFromImage(img); } catch (_) { /* retry on export */ }
    imageSizeCache[key] = entry;
    return entry;
  } catch (_) {
    return null;
  }
}

async function preloadAllBackgroundSizes() {
  const paths = new Set();
  Object.values(THEMES).forEach(t => { if (t.backgroundImage) paths.add(t.backgroundImage); });
  Object.values(OTHER_TEMPLATES).forEach(t => { if (t.backgroundImage) paths.add(t.backgroundImage); });
  await Promise.all([...paths].map(p => ensureImageSize(p)));
}

function posterDisplayHeight(tpl) {
  if (!tpl?.backgroundImage) return DEFAULT_POSTER_H;
  return posterHeightFor(tpl.backgroundImage, DEFAULT_POSTER_H);
}

function applyPreviewHeight(previewEl, imagePath, fallback, tpl) {
  if (imagePath) {
    previewEl.classList.add('poster');
    const h = tpl ? posterDisplayHeight(tpl) : posterHeightFor(imagePath, fallback);
    previewEl.style.height = h + 'px';
  } else {
    previewEl.classList.remove('poster');
    previewEl.style.height = '';
  }
}

function updatePreviewScale(frame, host, preview) {
  if (!frame || !host || !preview || !frame.clientWidth) return;

  preview.style.transform = 'none';
  const baseW = EXPORT_W;
  const baseH = parseInt(preview.style.height, 10) || preview.offsetHeight || DEFAULT_POSTER_H;
  if (!baseH) return;

  const maxW = Math.max(120, frame.clientWidth - PREVIEW_FRAME_PAD);
  // 按宽度适配，略留边距，避免长图被固定框高度压得过小
  const scale = (maxW / baseW) * PREVIEW_WIDTH_RATIO;
  const displayW = Math.ceil(baseW * scale);
  const displayH = Math.ceil(baseH * scale);

  preview.style.transform = Math.abs(scale - 1) > 0.01 ? `scale(${scale})` : 'none';
  host.style.width = displayW + 'px';
  host.style.height = displayH + 'px';
  frame.style.height = Math.max(PREVIEW_MIN_FRAME_H, displayH + PREVIEW_FRAME_PAD) + 'px';
}

function updateSchedulePreviewScale() {
  updatePreviewScale(
    document.getElementById('schedule-preview-frame'),
    document.getElementById('schedule-preview-host'),
    document.getElementById('schedule-preview'),
  );
}

function updateCarePreviewScale() {

    document.getElementById('care-preview-frame'),
    document.getElementById('care-preview-host'),
    document.getElementById('care-preview'),
  );

function updateOtherPreviewScale() {

    document.getElementById('other-preview-frame'),
    document.getElementById('other-preview-host'),
    document.getElementById('other-preview'),
  );

function updateAllPreviewScales() {

  updateCarePreviewScale();

function posterImageSrc(path) {
  if (isFileProtocol()) {
    const embedded = getEmbeddedAsset(path);
    if (embedded?.dataUrl) return embedded.dataUrl;
  }
  return `${resolveAssetPath(path)}?v=${POSTER_ASSET_VERSION}`;
}

function handlePosterImageError(img) {
  img.style.display = 'none';
  const root = img.closest('.export-root');
  if (root && root.dataset.fallbackGradient) {
    root.style.background = root.dataset.fallbackGradient;
  }
}

function preloadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    if (!src.startsWith('data:') && !isSameOriginUrl(src) && !isFileProtocol()) {
      img.crossOrigin = 'anonymous';
    }
    img.src = src;
  });
}

function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function imageToDataUrl(src) {
  if (!src || src.startsWith('data:')) return src;

  const path = assetPathFromSrc(src);
  if (path) {
    const cached = imageSizeCache[imageSizeCacheKey(path)];
    if (cached?.dataUrl) return cached.dataUrl;
    const embedded = getEmbeddedAsset(path);
    if (embedded?.dataUrl) return embedded.dataUrl;
  }

  if (!isFileProtocol() && isSameOriginUrl(src)) {
    for (const trySrc of [src, src.split('?')[0]]) {
      try {
        const res = await fetch(trySrc);
        if (res.ok) return blobToDataUrl(await res.blob());
      } catch (_) { /* fallback */ }
    }
  }

  const loadedImg = findLoadedImage(src);
  if (loadedImg) {
    try { return canvasFromImage(loadedImg); } catch (_) { /* fallback */ }
  }

  for (const trySrc of [src, src.split('?')[0]]) {
    try {
      return canvasFromImage(await preloadImage(trySrc));
    } catch (_) { /* try next */ }
  }

  throw new Error('image inline failed');
}

async function waitForImages(root) {
  const imgs = [...root.querySelectorAll('img')];
  await Promise.all(imgs.map(img => new Promise(resolve => {
    if (img.complete && img.naturalWidth > 0) return resolve();
    img.onload = resolve;
    img.onerror = resolve;
  })));
}

async function inlineImagesForExport(root) {
  const imgs = [...root.querySelectorAll('img')];
  for (const img of imgs) {
    if (!img.getAttribute('src') || img.src.startsWith('data:')) continue;
    const dataUrl = await imageToDataUrl(img.src);
    img.src = dataUrl;
    img.removeAttribute('crossorigin');
  }
}

function updateSchedulePreviewSize(themeKey) {

function getGlassPanelStyle(forExport) {
  if (forExport) {
    return 'background:linear-gradient(180deg,rgba(255,255,255,0.96) 0%,rgba(255,255,255,0.90) 100%);border:1px solid rgba(255,255,255,0.75);border-radius:18px;box-shadow:0 4px 20px rgba(15,23,42,0.10);';
  }
  return 'background:rgba(255,255,255,0.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.35);border-radius:18px;box-shadow:0 2px 12px rgba(15,23,42,0.06);';
}

function parseInsetPx(value, base) {
  if (typeof value === 'string' && value.endsWith('%')) return base * parseFloat(value) / 100;
  const n = parseFloat(value);
  return Number.isFinite(n) ? n : 0;
}

function getPosterCalendarMetrics(theme) {
  const inset = theme.contentInset || { top: '13%', left: '8%', right: '8%', bottom: '24%' };
  const panelPadH = 12;
  const calWrapPadH = 8;
  const badgeSlack = 6;
  const available = EXPORT_W
    - parseInsetPx(inset.left, EXPORT_W)
    - parseInsetPx(inset.right, EXPORT_W)
    - panelPadH * 2
    - calWrapPadH * 2
    - badgeSlack;
  const GAP = 2;
  const ROW_GAP = 4;
  const cellW = Math.max(32, Math.floor((available - 6 * GAP) / 7));
  const cellH = isShowLunarCalendar() ? 50 : 46;
  return { cellW, cellH, GAP, ROW_GAP, panelPadH, calWrapPadH };
}

function parsePromoSections(text) {
  const sections = [];
  let current = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('# ')) {
      const body = trimmed.slice(2);
      const pipe = body.indexOf('|');
      current = pipe > -1
        ? { num: body.slice(0, pipe).trim(), label: body.slice(pipe + 1).trim(), items: [] }
        : { num: '', label: body, items: [] };
      sections.push(current);
      continue;
    }
    if (!current) {
      current = { num: '', label: '', items: [] };
      sections.push(current);
    }
    const pipe = trimmed.indexOf('|');
    if (/^\d+\|/.test(trimmed)) {
      const n = trimmed.slice(0, pipe);
      current.items.push({ type: 'num', n, text: trimmed.slice(pipe + 1).trim() });
    } else if (pipe > -1) {
      current.items.push({ type: 'kv', key: trimmed.slice(0, pipe).trim(), val: trimmed.slice(pipe + 1).trim() });
    } else {
      current.items.push({ type: 'text', text: trimmed });
    }
  }
  return sections;
}

function buildPromoSectionHTML(sections) {
  return sections.map(sec => {
    const items = sec.items.map(item => {
      if (item.type === 'num') {
        return `<div style="font-size:11px;color:#334155;line-height:17px;margin-bottom:5px;">${esc(item.n)}. ${esc(item.text)}</div>`;
      }
      if (item.type === 'kv') {
        return `<div style="font-size:11px;line-height:17px;margin-bottom:4px;">
          <span style="color:#64748b;">${esc(item.key)}</span> <span style="color:#334155;">${esc(item.val)}</span>
        </div>`;
      }
      return `<div style="font-size:11px;color:#334155;line-height:17px;margin-bottom:5px;">${esc(item.text)}</div>`;
    }).join('');
    return `<div style="margin-bottom:8px;">${items}</div>`;
  }).join('');
}

// 坐标按 promo-bg.png（724×1024）实测；海报整体高度固定，仅正文 div 在内部向下延伸
function promoLayoutCoords(h) {
  const rw = EXPORT_W / 724;
  return {
    titleTop: Math.round(h * 0.1035),
    ribbonTop: Math.round(h * 0.251),
    ribbonH: Math.round(h * 0.053),
    ribbonLeft: Math.round(128 * rw),
    ribbonRight: Math.round(128 * rw),
    contentTop: Math.round(h * 0.328),
    contentLeft: Math.round(148 * rw),
    contentRight: Math.round(148 * rw),
    contentBottomPad: Math.round(h * 0.295),
  };
}

function promoContentMinHeight(h, lay) {
  return Math.max(40, h - lay.contentTop - lay.contentBottomPad);
}

function promoTitleStyle(accent) {
  const stroke = [
    '-1px -1px 0 #fff', '1px -1px 0 #fff', '-1px 1px 0 #fff', '1px 1px 0 #fff',
    '0 -1px 0 #fff', '0 1px 0 #fff', '-1px 0 0 #fff', '1px 0 0 #fff',
    '0 0 8px rgba(255,255,255,0.95)', `0 2px 0 ${accent}`, '0 3px 8px rgba(6,95,70,0.18)',
  ].join(',');
  return `font-size:26px;font-weight:800;color:${accent};line-height:1.08;letter-spacing:3px;text-shadow:${stroke};`;
}

function syncPromoPosterHeight(root, previewEl) {
  const baseH = posterDisplayHeight(OTHER_TEMPLATES.promo);
  if (root) {
    root.style.height = baseH + 'px';
    root.style.overflow = 'hidden';
  }
  if (previewEl) previewEl.style.height = baseH + 'px';
  return baseH;
}

function parseNoticeSections(text) {
  const sections = [];
  let current = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('# ')) {
      current = { header: trimmed.slice(2), items: [] };
      sections.push(current);
      continue;
    }
    if (!current) {
      current = { header: '', items: [] };
      sections.push(current);
    }
    if (trimmed.startsWith('• ') || trimmed.startsWith('- ')) {
      const body = trimmed.slice(2);
      const pipe = body.indexOf('|');
      if (pipe > -1) {
        current.items.push({ title: body.slice(0, pipe).trim(), desc: body.slice(pipe + 1).trim() });
      } else {
        current.items.push({ text: body });
      }
    } else {
      current.items.push({ text: trimmed });
    }
  }
  return sections;
}

function buildNoticeSectionHTML(sections) {
  const accent = '#3b82f6';
  return sections.map(sec => {
    const header = sec.header
      ? `<div style="font-size:12px;font-weight:600;color:${accent};margin-bottom:8px;line-height:18px;">
          <span style="display:inline-block;width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-left:5px solid ${accent};margin-right:6px;vertical-align:middle;"></span>${esc(sec.header)}
        </div>`
      : '';
    const items = sec.items.map(item => {
      if (item.title) {
        return `<div style="margin-bottom:10px;">
          <div style="font-size:11px;font-weight:700;color:#1e293b;line-height:16px;">• ${esc(item.title)}</div>
          ${item.desc ? `<div style="font-size:10px;color:#64748b;line-height:15px;margin-top:3px;padding-left:10px;">${esc(item.desc)}</div>` : ''}
        </div>`;
      }
      return `<div style="font-size:10px;color:#475569;line-height:16px;margin-bottom:6px;">${esc(item.text)}</div>`;
    }).join('');
    return `<div style="margin-bottom:14px;">${header}${items}</div>`;
  }).join('');
}

function noticeLayoutCoords(h) {
  const rw = EXPORT_W / 729;
  const rh = h / 1024;
  return {
    titleTop: Math.round(52 * rh),
    padX: Math.round(103 * rw),
    pillTop: Math.round(270 * rh),
    pillLeft: Math.round(100 * rw),
    pillW: Math.round(176 * rw),
    pillH: Math.round(34 * rh),
    pillFont: 10,
    contentTop: Math.round(330 * rh),
    contentBottom: Math.round(208 * rh),
    footerBottom: Math.round(24 * rh),
  };
}

function dentalDayLayoutCoords(h) {
  const rh = h / 1024;
  const rw = EXPORT_W / 569;
  return {
    titleTop: Math.round(498 * rh),
    dateTop: Math.round(558 * rh),
    contentTop: Math.round(612 * rh),
    contentLeft: Math.round(36 * rw),
    contentRight: Math.round(36 * rw),
    contentBottom: Math.round(118 * rh),
    footerTop: Math.round(928 * rh),
  };
}

function dentalDayContentMinHeight(h, lay) {
  return Math.max(60, h - lay.contentTop - lay.contentBottom);
}

function syncDentalDayPosterHeight(root, previewEl) {
  const tpl = OTHER_TEMPLATES.dental_day;
  const baseH = posterDisplayHeight(tpl);
  if (!root) return baseH;
  const lay = dentalDayLayoutCoords(baseH);
  const panel = root.querySelector('.dental-day-content-panel');
  const needH = panel
    ? Math.max(baseH, lay.contentTop + panel.offsetHeight + lay.contentBottom)
    : baseH;
  const grow = needH - baseH;
  root.style.height = needH + 'px';
  root.style.overflow = 'visible';
  const footer = root.querySelector('.dental-day-footer');
  if (footer) footer.style.top = (lay.footerTop + grow) + 'px';
  if (previewEl) previewEl.style.height = needH + 'px';
  return needH;
}

function buildDentalDayMessageHTML(lines, lay, h) {
  if (!lines.length) return '';
  const minH = dentalDayContentMinHeight(h, lay);
  const fontSize = lines.length <= 2 ? 16 : lines.length <= 5 ? 14 : 12;
  const lineGap = lines.length <= 5 ? 6 : 4;
  const linesHtml = lines.map((line, i) =>
    `<div style="font-size:${fontSize}px;font-weight:400;color:#ffffff;line-height:1.45;letter-spacing:1.5px;text-align:center;${i ? `margin-top:${lineGap}px;` : ''}">${esc(line)}</div>`

  return `<div style="position:absolute;top:${lay.contentTop}px;left:${lay.contentLeft}px;right:${lay.contentRight}px;z-index:2;box-sizing:border-box;">
    <div class="dental-day-content-panel" style="background:rgba(255,255,255,0.22);border-radius:10px;padding:12px 14px;min-height:${minH}px;box-sizing:border-box;overflow:visible;">

}

  if ('clinic' in d) {
    clinic.value = d.clinic || '';
  } else if (tpl.footerClinic || tpl.type === 'notice-card') {
    clinic.value = window.CLINIC_INFO?.name || '';
  } else {
    clinic.value = '';
  }
  sub.value = d.subtitle || '';
  msg.value = d.message || '';
  fitTextareaRows(msg, messageTextareaMinRows(tpl.type));
  sub.placeholder = tpl.type === 'dental-day-card' ? '如：2025.9.20'
    : (d.subtitle ? `如：${d.subtitle}` : '可填写副标题');
  msg.placeholder = tpl.type === 'notice-card' ? '用 # 标题、• 条目|说明 格式填写'
    : tpl.type === 'promo-card' ? '每行一句；列表用 数字|条目；详情用 关键词|内容（# 分段仅换段，不显示标题）'
    : tpl.type === 'dental-day-card' ? '每行一句宣传语，回车换行，支持多行'
    : (d.message ? `如：${d.message.split('\n')[0]}` : '可填写正文文案');
  const clinicLabel = document.getElementById('other-clinic-label');
  if (clinicLabel) {
    const isTitleTpl = tpl.type === 'dental-day-card' || tpl.type === 'promo-card';
    clinicLabel.textContent = isTitleTpl ? '主标题' : (tpl.footerClinic ? '门诊名称' : '诊所名称');
    clinic.rows = tpl.type === 'notice-card' ? 2 : 1;
    clinic.placeholder = tpl.type === 'dental-day-card' ? '如：全国爱牙日'
      : tpl.type === 'promo-card' ? '如：全国爱牙日'
      : tpl.type === 'notice-card' ? '如：西大口腔门诊部，回车可换行'
      : tpl.footerClinic ? '如：西大口腔门诊部'
      : '如：阳光口腔诊所';
  }
  document.getElementById('other-address-wrap').classList.toggle('hidden', !tpl.showAddress);
}

function selectOtherTemplate(key) {
  selectedOtherTemplate = key;
  renderOtherTemplateGrid();
  applyOtherTemplateDefaults();
  applyClinicInfoToForms();
  renderOtherPreview();
}

async function renderOtherPreview() {
  const tpl = OTHER_TEMPLATES[selectedOtherTemplate];
  if (tpl.backgroundImage) await ensureImageSize(tpl.backgroundImage);
  const preview = document.getElementById('other-preview');
  preview.innerHTML = buildOtherHTML();
  applyPreviewHeight(preview, tpl.backgroundImage, DEFAULT_POSTER_H, tpl);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const root = preview.querySelector('.export-root');
    if (selectedOtherTemplate === 'promo') syncPromoPosterHeight(root, preview);
    else if (selectedOtherTemplate === 'dental_day') syncDentalDayPosterHeight(root, preview);
    updateOtherPreviewScale();
  }));
}

// ==================== 导出图片 ====================
async function exportImage(type) {
  const btn = event?.target?.closest('button');
  if (btn) btn.classList.add('export-loading');

  if (type === 'schedule') {
    const themeKey = selectedStyle === 'auto' ? detectAutoTheme() : selectedStyle;
    const bg = THEMES[themeKey]?.backgroundImage;
    if (bg) await ensureImageSize(bg);
  } else if (type === 'other') {
    const bg = OTHER_TEMPLATES[selectedOtherTemplate]?.backgroundImage;
    if (bg) await ensureImageSize(bg);
  }

  const host = document.createElement('div');
  host.style.cssText = `position:fixed;left:0;top:0;width:${EXPORT_W}px;opacity:0;pointer-events:none;z-index:-1;`;
  const builders = { schedule: buildScheduleHTML, care: buildCareHTML, other: buildOtherHTML };
  host.innerHTML = builders[type]();
  document.body.appendChild(host);

  const el = host.querySelector('.export-root');
  if (!el) {
    alert('图片导出失败，请重试');
    document.body.removeChild(host);
    if (btn) btn.classList.remove('export-loading');
    return;
  }

  await waitForImages(el);
  try {
    await inlineImagesForExport(el);
  } catch (_) {
    alert('图片导出失败，请重试');
    document.body.removeChild(host);
    if (btn) btn.classList.remove('export-loading');
    return;
  }
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  let exportH = parseInt(el.style.height, 10) || el.offsetHeight || DEFAULT_POSTER_H;
  if (type === 'other' && selectedOtherTemplate === 'promo') {
    exportH = syncPromoPosterHeight(el, null);
  } else if (type === 'other' && selectedOtherTemplate === 'dental_day') {
    exportH = syncDentalDayPosterHeight(el, null);
  }
  if (exportH < 1) exportH = DEFAULT_POSTER_H;

  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: false,
      allowTaint: false,
      backgroundColor: '#ffffff',
      logging: false,
      foreignObjectRendering: false,
      width: EXPORT_W,
      height: exportH,
      windowWidth: EXPORT_W,
      windowHeight: exportH,
      scrollX: 0,
      scrollY: 0,
      onclone: (_doc, clonedEl) => {
        clonedEl.style.transform = 'none';
        clonedEl.style.margin = '0';
        clonedEl.style.overflow = 'hidden';
        clonedEl.querySelectorAll('*').forEach(node => {
          node.style.transform = 'none';
          node.style.backdropFilter = 'none';
          node.style.webkitBackdropFilter = 'none';
        });
      },
    });
    const link = document.createElement('a');
    const names = { schedule: '节假日排期', care: '术后护理', other: '其他图文' };
    const prefix = names[type] || '图文';
    link.download = `${prefix}_${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('图片导出失败，请重试');
  } finally {
    document.body.removeChild(host);
    if (btn) btn.classList.remove('export-loading');
  }
}

// ==================== 初始化 ====================
let previewResizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(previewResizeTimer);
  previewResizeTimer = setTimeout(updateAllPreviewScales, 120);
});

async function init() {
  await loadEmbeddedAssets();
  await loadClinicInfo();
  renderStylePills();
  renderTemplateGrid();
  renderOtherTemplateGrid();
  applyOtherTemplateDefaults();
  applyClinicInfoToForms();
  setupCalDayTooltip();
  await fetchHolidays(currentYear);
  await preloadAllBackgroundSizes();
  await renderSchedulePreview();
  renderCarePreview();
  await renderOtherPreview();
}

init();
</script>
