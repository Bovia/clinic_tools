<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"PingFang SC"', '"Microsoft YaHei"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    .tab-active { background: #0d9488; color: #fff; box-shadow: 0 2px 8px rgba(13,148,136,.35); }
    .style-pill { transition: all .2s; }
    .style-pill.active { ring: 2px; box-shadow: 0 0 0 2px #0d9488; }
    .tpl-card { transition: all .2s; cursor: pointer; }
    .tpl-card.active { border-color: #0d9488; background: #f0fdfa; box-shadow: 0 0 0 2px #0d9488; }
    .cal-day { cursor: pointer; transition: background .15s; }
    .cal-day:hover { background: #f1f5f9; }
    .preview-card { width: 360px; }
    .preview-card > .export-root { width: 360px; }
    @media (max-width: 640px) { .preview-card { width: 100%; max-width: 360px; } }

    .export-loading { pointer-events: none; opacity: .6; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .8s linear infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

  <!-- 顶栏 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 flex items-center justify-center text-white font-bold text-lg shadow-md">齿</div>
        <div>
          <h1 class="text-lg font-bold text-slate-900">齿科设计助手</h1>
          <p class="text-xs text-slate-500">排期表 · 术后须知 · 一键出图</p>
        </div>
      </div>
      <nav class="flex gap-2 bg-slate-100 p-1 rounded-full">
        <button id="tab-schedule" onclick="switchTab('schedule')" class="tab-btn tab-active px-5 py-2 rounded-full text-sm font-medium transition">节假日排期</button>
        <button id="tab-care" onclick="switchTab('care')" class="tab-btn px-5 py-2 rounded-full text-sm font-medium text-slate-600 transition">术后护理</button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">

    <!-- ========== 节假日排期 ========== -->
    <section id="panel-schedule">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <div class="flex flex-wrap items-start justify-between gap-4 mb-5">
          <div>
            <h2 class="text-xl font-bold text-slate-900">节假日排期表</h2>
            <p class="text-sm text-slate-500 mt-1">自动获取节假日数据，点击下方预览日历中的日期可切换出诊/休息，一键导出通知图</p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button onclick="refreshHolidays()" class="px-4 py-2 text-sm border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              刷新节假日
            </button>
            <button onclick="exportImage('schedule')" class="px-4 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              导出图片
            </button>
          </div>
        </div>

        <!-- 月份选择 -->
        <div class="flex items-center justify-center gap-4 mb-5">
          <button onclick="changeMonth(-1)" class="w-9 h-9 rounded-lg border border-slate-200 hover:bg-slate-50 flex items-center justify-center text-slate-600">&lt;</button>
          <span id="month-label" class="text-lg font-semibold min-w-[140px] text-center"></span>
          <button onclick="changeMonth(1)" class="w-9 h-9 rounded-lg border border-slate-200 hover:bg-slate-50 flex items-center justify-center text-slate-600">&gt;</button>
        </div>

        <!-- 诊所信息 -->
        <div class="grid sm:grid-cols-2 gap-4 mb-5">
          <div>
            <label class="text-sm text-slate-600 mb-1 block">诊所名称</label>
            <input id="sch-clinic" type="text" placeholder="如：阳光口腔诊所" oninput="renderSchedulePreview()"
              class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500" />
          </div>
          <div>
            <label class="text-sm text-slate-600 mb-1 block">联系电话</label>
            <input id="sch-phone" type="text" placeholder="如：010-12345678" oninput="renderSchedulePreview()"
              class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30 focus:border-teal-500" />
          </div>
        </div>

        <!-- 风格选择 -->
        <div class="mb-2">
          <label class="text-sm text-slate-600 mb-2 block">选择风格</label>
          <div id="style-pills" class="flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- 预览 -->
      <div class="flex justify-center pb-8">
        <div id="schedule-preview" class="preview-card bg-white rounded-2xl shadow-xl overflow-hidden"></div>
      </div>
    </section>

    <!-- ========== 术后护理 ========== -->
    <section id="panel-care" class="hidden">
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 mb-6">
        <div class="flex flex-wrap items-start justify-between gap-4">
          <div>
            <h2 class="text-xl font-bold text-slate-900">术后护理须知</h2>
            <p class="text-sm text-slate-500 mt-1">选择模板，填写个性化信息，一键生成患者须知图</p>
          </div>
          <button onclick="exportImage('care')" class="px-4 py-2 text-sm bg-teal-600 text-white rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            导出图片
          </button>
        </div>
      </div>

      <div class="grid lg:grid-cols-2 gap-6 pb-8">
        <!-- 左侧控制 -->
        <div class="space-y-6">
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">选择模板</h3>
            <div id="tpl-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
          </div>
          <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
            <h3 class="text-sm font-semibold text-slate-700 mb-3">个性化信息</h3>
            <div class="space-y-3">
              <div>
                <label class="text-xs text-slate-500 mb-1 block">诊所名称</label>
                <input id="care-clinic" type="text" placeholder="如：阳光口腔诊所" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">联系电话</label>
                <input id="care-phone" type="text" placeholder="如：010-12345678" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">复诊时间</label>
                <input id="care-followup" type="text" placeholder="如：术后7天上午10:00" oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30" />
              </div>
              <div>
                <label class="text-xs text-slate-500 mb-1 block">医生建议（选填）</label>
                <textarea id="care-advice" rows="3" placeholder="可补充个性化医嘱..." oninput="renderCarePreview()"
                  class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500/30 resize-none"></textarea>
              </div>
            </div>

        </div>

        <div class="flex justify-center lg:justify-start">
          <div id="care-preview" class="preview-card bg-white rounded-2xl shadow-xl overflow-hidden"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center text-xs text-slate-400 py-6 border-t border-slate-100">
  齿科设计助手 · 本地运行，无需数据库 · 节假日数据来自 timor.tech
  </footer>

// ==================== Tab 切换 ====================
function switchTab(tab) {
  document.getElementById('panel-schedule').classList.toggle('hidden', tab !== 'schedule');
  document.getElementById('panel-care').classList.toggle('hidden', tab !== 'care');
  document.getElementById('tab-schedule').classList.toggle('tab-active', tab === 'schedule');
  document.getElementById('tab-care').classList.toggle('tab-active', tab === 'care');
  document.getElementById('tab-schedule').classList.toggle('text-slate-600', tab !== 'schedule');
  document.getElementById('tab-care').classList.toggle('text-slate-600', tab !== 'care');
}

// ==================== 节假日 API ====================
async function fetchFromTimor(year) {
  const res = await fetch(`https://timor.tech/api/holiday/year/${year}/?type=Y&week=Y`);
  const json = await res.json();
  if (json.code === 0 && json.holiday) {
    holidayData = json.holiday;
    return true;
  }
  return false;
}

async function fetchFromHolidayCn(year) {
  const urls = [
    `https://cdn.jsdelivr.net/gh/NateScarlet/holiday-cn@master/${year}.json`,
    `https://raw.githubusercontent.com/NateScarlet/holiday-cn/master/${year}.json`,
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      const json = await res.json();
      if (json.days) {
        const map = {};
        json.days.forEach(day => {
          const [, mm, dd] = day.date.split('-');
          const key = `${mm}-${dd}`;
          map[key] = {
            holiday: day.isOffDay,
            name: day.isOffDay ? day.name : (day.name || '补班'),
            date: day.date,
          };
        });
        holidayData = map;
        return true;
      }
    } catch (_) { /* try next */ }
  }
  return false;
}

async function fetchHolidays(year) {
  try {
    if (await fetchFromTimor(year)) return true;
  } catch (e) {
    console.warn('timor.tech 获取失败，尝试备用源', e);
  }
  try {
    if (await fetchFromHolidayCn(year)) return true;
  } catch (e) {
    console.warn('备用节假日源也失败，使用周末默认规则', e);
  }
  holidayData = {};
  return false;
}

async function refreshHolidays() {
  const btn = event?.target?.closest('button');
  if (btn) btn.classList.add('export-loading');
  await fetchHolidays(currentYear);
  initDayStates();
  renderSchedulePreview();
  renderStylePills();
  if (btn) btn.classList.remove('export-loading');
}

// ==================== 日历逻辑 ====================
function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function isWeekend(y, m, d) {
  const day = new Date(y, m, d).getDay();
  return day === 0 || day === 6;
}

function getHolidayInfo(y, m, d) {
  const key = `${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return holidayData[key] || null;
}

function defaultIsWork(y, m, d) {
  const info = getHolidayInfo(y, m, d);
  if (info) {
    if (info.holiday === true) return false;
    if (info.holiday === false) return true; // 调休上班
  }
  return !isWeekend(y, m, d);
}

function isWorkDay(y, m, d) {
  const k = dateKey(y, m, d);
  if (k in dayOverrides) return dayOverrides[k];
  return defaultIsWork(y, m, d);
}

function toggleDay(y, m, d) {
  const k = dateKey(y, m, d);
  const current = isWorkDay(y, m, d);
  dayOverrides[k] = !current;
  renderSchedulePreview();
}

function initDayStates() {
  // 切换月份时保留已有 override，不重置
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  fetchHolidays(currentYear).then(() => {
    renderSchedulePreview();
    renderStylePills();
  });
}

function detectAutoTheme() {
  for (let d = 1; d <= 31; d++) {
    const info = getHolidayInfo(currentYear, currentMonth, d);
    if (info && info.holiday && isRealHolidayName(info.name)) {
      for (const [kw, theme] of Object.entries(HOLIDAY_THEME_MAP)) {
        if (info.name.includes(kw)) return theme;
      }
    }
  }
  return 'ocean';
}

function getActiveTheme() {
  const key = selectedStyle === 'auto' ? detectAutoTheme() : selectedStyle;
  return THEMES[key] || THEMES.ocean;
}

function isRealHolidayName(name) {
  if (!name) return false;
  if (/^周[一二三四五六日]$/.test(name)) return false;
  if (name === '补班' || name.includes('补班')) return false;
  return true;
}

function getMonthFestivalName() {
  for (let d = 1; d <= 31; d++) {
    const info = getHolidayInfo(currentYear, currentMonth, d);
    if (info && info.holiday && isRealHolidayName(info.name)) return info.name;
  }
  return '';
}

function getMonthGreeting() {
  const theme = getActiveTheme();
  if (theme.greeting) return theme.greeting;
  const fest = getMonthFestivalName();
  if (fest) return `祝您${fest}快乐`;
  return '';
}

function getMonthTag() {
  const theme = getActiveTheme();
  if (theme.tag) return theme.tag;
  return getMonthFestivalName();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getThemeGradient(themeKey) {
  return THEMES[themeKey]?.gradient || THEMES.ocean.gradient;
}

// ==================== 风格选择器 ====================
function renderStylePills() {
  const autoTheme = detectAutoTheme();
  const autoLabel = THEMES[autoTheme]?.tag || '自动';
  const container = document.getElementById('style-pills');
  container.innerHTML = Object.entries(THEMES).map(([key, t]) => {
    const label = key === 'auto' ? `节日自动 · ${autoLabel}` : t.label;
    const active = selectedStyle === key;
    return `<button onclick="selectStyle('${key}')" class="style-pill px-3 py-1.5 rounded-full text-xs border ${active ? 'active border-teal-500 bg-teal-50 text-teal-700 font-medium' : 'border-slate-200 text-slate-600 hover:bg-slate-50'}">
      <span class="inline-block w-2 h-2 rounded-full mr-1.5" style="background:${t.color}"></span>${label}
    </button>`;
  }).join('');
}

function selectStyle(key) {
  selectedStyle = key;
  renderStylePills();
  renderSchedulePreview();
}

// ==================== 排期 HTML 构建（表格布局，html2canvas 友好） ====================
function buildScheduleHTML(interactive) {
  const clinic = document.getElementById('sch-clinic').value || '诊所名称';
  const phone = document.getElementById('sch-phone').value;
  const themeKey = selectedStyle === 'auto' ? detectAutoTheme() : selectedStyle;
  const gradient = getThemeGradient(themeKey);
  const tag = getMonthTag();
  const greeting = getMonthGreeting();
  const isLight = themeKey === 'simple';
  const headerColor = isLight ? '#1e293b' : '#ffffff';
  const subColor = isLight ? '#64748b' : '#e2e8f0';
  const tagBg = isLight ? '#e2e8f0' : 'rgba(255,255,255,0.25)';

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const startOffset = firstDay === 0 ? 6 : firstDay - 1;

  const slots = [];
  for (let i = 0; i < startOffset; i++) slots.push(0);
  for (let d = 1; d <= daysInMonth; d++) slots.push(d);
  while (slots.length % 7 !== 0) slots.push(0);

  function dayCell(d) {
    if (!d) return '<td style="width:44px;height:54px;padding:0;border:0;"></td>';
    const work = isWorkDay(currentYear, currentMonth, d);
    const info = getHolidayInfo(currentYear, currentMonth, d);
    let holidayLabel = '';
    if (!work && info && info.holiday && isRealHolidayName(info.name)) {
      holidayLabel = info.name.replace(/节$/, '').slice(0, 4);
    }
    const label = work ? '诊' : '休';
    const numColor = work ? '#16a34a' : '#dc2626';
    const bg = work ? '#f0fdf4' : '#fef2f2';
    const border = work ? '#bbf7d0' : '#fecaca';
    const click = interactive ? ` onclick="toggleDay(${currentYear},${currentMonth},${d})" class="cal-day"` : '';
    return `<td${click} style="width:44px;height:54px;padding:0;border:0;vertical-align:middle;">
      <div style="width:44px;height:54px;background:${bg};border:1px solid ${border};border-radius:8px;text-align:center;box-sizing:border-box;padding-top:6px;">
        <div style="font-size:16px;font-weight:700;line-height:18px;color:${numColor};">${d}</div>
        ${holidayLabel ? `<div style="font-size:9px;line-height:11px;color:#dc2626;margin-top:1px;height:11px;overflow:hidden;">${esc(holidayLabel)}</div>` : '<div style="height:12px;"></div>'}
        <div style="font-size:10px;font-weight:600;line-height:12px;color:${numColor};margin-top:1px;">${label}</div>
      </div>
    </td>`;
  }

  let calendarRows = '';
  for (let i = 0; i < slots.length; i += 7) {
    calendarRows += '<tr>' + slots.slice(i, i + 7).map(dayCell).join('') + '</tr>';
  }

  const footerText = greeting ? `${esc(greeting)} · 如有变动请以诊所通知为准` : '如有变动请以诊所通知为准';

  return `<div class="export-root" style="width:${EXPORT_W}px;background:#ffffff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;">
    <div style="background:${gradient};padding:24px 20px 20px;box-sizing:border-box;">
      ${tag ? `<div style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:600;background:${tagBg};color:${headerColor};margin-bottom:8px;">${esc(tag)}</div>` : ''}
      <div style="text-align:right;font-size:12px;color:${subColor};margin-bottom:4px;">${esc(clinic)}</div>
      <div style="font-size:24px;font-weight:700;color:${headerColor};line-height:30px;">${currentYear} ${MONTHS[currentMonth]}</div>
      <div style="font-size:14px;color:${subColor};margin-top:2px;">出诊排期表</div>
      <div style="margin-top:12px;font-size:11px;color:${subColor};">
        <span style="display:inline-block;margin-right:16px;"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:4px;vertical-align:middle;"></span>出诊</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f87171;margin-right:4px;vertical-align:middle;"></span>休息</span>
      </div>
    </div>
    <div style="padding:12px 8px 16px;box-sizing:border-box;">
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-bottom:6px;">
        <tr>${WEEKDAYS.map(w => `<td style="text-align:center;font-size:11px;color:#94a3b8;padding:0 0 6px;">周${w}</td>`).join('')}</tr>
      </table>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
        ${calendarRows}
      </table>
    </div>
    <div style="padding:0 20px 20px;text-align:center;">
      <div style="font-size:12px;color:#64748b;line-height:18px;">${footerText}</div>
      ${phone ? `<div style="font-size:12px;color:#94a3b8;margin-top:6px;">咨询电话：${esc(phone)}</div>` : ''}
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9;font-size:10px;color:#cbd5e1;letter-spacing:1px;">DENTAL CLINIC SCHEDULE</div>
    </div>
  </div>`;
}

function renderSchedulePreview() {
  document.getElementById('month-label').textContent = `${currentYear}年 ${MONTHS[currentMonth]}`;
  document.getElementById('schedule-preview').innerHTML = buildScheduleHTML(true);
}

// ==================== 术后护理 ====================

  document.getElementById('tpl-grid').innerHTML = Object.entries(CARE_TEMPLATES).map(([key, t]) => `
    <div class="tpl-card border border-slate-200 rounded-xl p-3 text-center relative ${key === selectedTemplate ? 'active' : ''}"
      onclick="selectTemplate('${key}')">

      <div class="w-8 h-8 mx-auto rounded-lg mb-1.5 flex items-center justify-center text-xs font-bold text-white" style="background:${t.color}">${t.label.slice(0,2)}</div>

  const tpl = CARE_TEMPLATES[selectedTemplate];

  const phone = document.getElementById('care-phone').value;
  const followup = document.getElementById('care-followup').value;
  const advice = document.getElementById('care-advice').value;

  const steps = tpl.items.map((item, i) => `
    <tr>
      <td style="width:28px;padding:0 8px 10px 0;vertical-align:top;">

      </td>
      <td style="padding:0 0 10px 0;vertical-align:top;">

          <div style="font-size:14px;font-weight:600;color:#1e293b;line-height:20px;margin-bottom:4px;">${esc(item.t)}</div>
          <div style="font-size:12px;color:#64748b;line-height:18px;">${esc(item.d)}</div>

    <div style="background:${MEDICAL_GRADIENT};padding:24px 20px 20px;box-sizing:border-box;">
      <div style="font-size:10px;color:rgba(255,255,255,0.75);letter-spacing:2px;margin-bottom:4px;">${esc(tpl.en)}</div>
      <div style="font-size:18px;font-weight:700;color:#ffffff;line-height:26px;">${esc(tpl.title)}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.85);margin-top:4px;">${esc(clinic)}</div>
    </div>
    <div style="padding:16px;box-sizing:border-box;">
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;">${steps}</table>
      ${advice ? `<div style="margin-top:4px;padding:12px;border:1px dashed #99f6e4;border-radius:8px;background:#f0fdfa;box-sizing:border-box;">
        <div style="font-size:12px;font-weight:600;color:#0f766e;margin-bottom:4px;">医生建议</div>
        <div style="font-size:12px;color:#475569;line-height:18px;">${esc(advice)}</div>
      </div>` : ''}
      ${followup ? `<div style="margin-top:8px;padding:12px;border-radius:8px;background:#f1f5f9;box-sizing:border-box;">
        <span style="font-size:12px;font-weight:600;color:#334155;">复诊时间：</span>
        <span style="font-size:12px;color:#475569;">${esc(followup)}</span>
      </div>` : ''}
    </div>
    <div style="padding:12px 20px 20px;text-align:center;border-top:1px solid #f1f5f9;">
      ${phone ? `<div style="font-size:12px;color:#64748b;margin-bottom:8px;">如有不适请及时联系：${esc(phone)}</div>` : ''}
      <div style="font-size:10px;color:#cbd5e1;letter-spacing:1px;">DENTAL CARE INSTRUCTIONS</div>
    </div>
  </div>`;
}

function renderCarePreview() {
  document.getElementById('care-preview').innerHTML = buildCareHTML();
}

// ==================== 导出图片 ====================
async function exportImage(type) {
  const btn = event?.target?.closest('button');
  if (btn) btn.classList.add('export-loading');

  const host = document.createElement('div');
  host.style.cssText = `position:fixed;left:-9999px;top:0;width:${EXPORT_W}px;z-index:-1;`;
  host.innerHTML = type === 'schedule' ? buildScheduleHTML(false) : buildCareHTML();
  document.body.appendChild(host);

  const el = host.querySelector('.export-root');
  await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  try {
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      foreignObjectRendering: false,
      width: EXPORT_W,
      windowWidth: EXPORT_W,
      scrollX: 0,
      scrollY: 0,
    });
    const link = document.createElement('a');
    const prefix = type === 'schedule' ? '节假日排期' : '术后护理';
    link.download = `${prefix}_${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('导出失败，请重试：' + e.message);
  } finally {
    document.body.removeChild(host);
    if (btn) btn.classList.remove('export-loading');
  }
}

// ==================== 初始化 ====================
async function init() {
  renderStylePills();
  renderTemplateGrid();
  await fetchHolidays(currentYear);
  renderSchedulePreview();
  renderCarePreview();
}

init();
